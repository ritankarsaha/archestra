name: Dependency Security

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

concurrency:
  group: dependency-security-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  supply-chain-policy:
    name: Supply Chain Policy
    runs-on: blacksmith-2vcpu-ubuntu-2404
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Enforce image pinning and download verification policy
        run: python3 .github/scripts/check-supply-chain-policy.py

  dependency-review:
    name: Dependency Review
    runs-on: blacksmith-2vcpu-ubuntu-2404
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Dependency review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: high
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-1.0, AGPL-3.0
          comment-summary-in-pr: always

  socket-security:
    name: Socket Security
    if: ${{ secrets.SOCKET_SECURITY_API_KEY != '' && github.event.pull_request.head.repo.fork != true }}
    runs-on: blacksmith-2vcpu-ubuntu-2404
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 2

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install Socket CLI
        run: pip install --require-hashes -r .github/requirements/socketsecurity.txt

      - name: Run Socket scan
        env:
          SOCKET_SECURITY_API_KEY: ${{ secrets.SOCKET_SECURITY_API_KEY }}
          GH_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          socketcli \
            --target-path "$GITHUB_WORKSPACE" \
            --scm github \
            --pr-number "${{ github.event.pull_request.number }}"
